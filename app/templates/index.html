<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyhigh Policy Explorer (Finder Mode)</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">Skyhigh Policy Explorer</div>
            
            <div class="history-container" style="display: flex; align-items: center; gap: 5px;">
                <select id="history-select" onchange="handleSetChange()">
                    <option value="">정책 히스토리 선택...</option>
                </select>
                <button class="btn-icon" title="현재 이력 삭제" onclick="handleDeleteCurrentSet()">🗑️</button>
                <button class="btn-icon" title="전체 히스토리 초기화" onclick="handleClearAllHistory()">🧹</button>
            </div>

            <div class="search-container">
                <input type="text" id="global-search" placeholder="IP, URL, Rule 검색 (Enter)" onkeyup="handleSearch(event)">
            </div>
            
            <div class="search-container" style="max-width: 300px;">
                <input type="text" id="value-search" placeholder="List 값 검색 (e.g. google.com)" onkeyup="handleValueSearch(event)">
            </div>
            <!-- 검색 결과 오버레이 -->
            <div id="search-results" class="search-results-overlay"></div>
            <div id="analysis-results" class="search-results-overlay" style="left: 600px;"></div>

            <div class="actions">
                <button class="btn" onclick="showTopHosts()">Host 통계</button>
                <input type="file" id="xml-upload" accept=".xml" style="display:none;" onchange="handleFileUpload()">
                <button class="btn primary" onclick="document.getElementById('xml-upload').click()">XML 업로드</button>
            </div>
        </header>

        <!-- 탭바 -->
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-policies" onclick="showTab('policies')">📋 정책 트리</button>
            <button class="tab-btn" id="tab-lists" onclick="showTab('lists')">📦 Lists</button>
        </div>

        <main class="app-main">
            <!-- 가로로 확장되는 밀러 컬럼 영역 -->
            <div id="tree-container" class="tree-container">
                <div class="loading" style="padding: 20px;">정책을 선택하거나 업로드하세요.</div>
            </div>

            <!-- Lists 탭 패널 -->
            <div id="lists-container" class="lists-container">
                <div class="lists-sidebar">
                    <div class="lists-sidebar-header">
                        <input type="text" id="list-name-filter" placeholder="List 이름 검색..." oninput="filterListNames(this.value)">
                    </div>
                    <div class="lists-names-panel" id="lists-names-panel">
                        <div class="lists-empty-state">정책을 먼저 선택하세요.</div>
                    </div>
                </div>
                <div class="lists-entries-panel" id="lists-entries-panel">
                    <div class="lists-empty-state">왼쪽에서 List를 선택하세요.</div>
                </div>
            </div>

            <!-- Resizer -->
            <div class="resizer" id="drag-resizer"></div>

            <!-- 우측 상세 정보 패널 (고정) -->
            <section class="detail-panel" id="detail-view">
                <div class="detail-header">
                    <span>상세 정보</span>
                    <button class="btn-icon" style="font-size: 14px;" onclick="closeDetailView()">✕</button>
                </div>
                <div id="detail-content" class="detail-container">
                    <div class="empty-state" style="text-align:center; color:#999; margin-top:50px;">
                        항목을 선택하여 상세 내용을 확인하세요.
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <span id="status-msg">준비됨</span>
            <span id="policy-stats">Policies: Miller Columns Mode (SQLite DB)</span>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
