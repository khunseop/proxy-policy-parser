<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyhigh Policy Explorer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="app">

    <!-- Header -->
    <header class="app-header">
        <div class="logo">Skyhigh Policy Explorer</div>
        <div class="header-mid">
            <select id="history-select" onchange="handleSetChange()">
                <option value="">정책 선택...</option>
            </select>
            <button class="btn-icon" title="현재 이력 삭제" onclick="handleDeleteCurrentSet()">🗑️</button>
            <button class="btn-icon" title="전체 히스토리 초기화" onclick="handleClearAllHistory()">🧹</button>
        </div>
        <div class="header-right">
            <input type="file" id="xml-upload" accept=".xml" style="display:none;" onchange="handleFileUpload()">
            <button class="btn sm" id="diff-btn" onclick="openDiffModal()">⚖️ Diff</button>
            <button id="xml-upload-btn" class="btn primary" onclick="document.getElementById('xml-upload').click()">XML 업로드</button>
        </div>
    </header>

    <!-- Workspace -->
    <div class="workspace">

        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-tabs">
                <button class="stab active" data-tab="policies" onclick="showTab('policies')">📋 Policy</button>
                <button class="stab" data-tab="lists" onclick="showTab('lists')">📦 Lists</button>
                <button class="stab" data-tab="stats" onclick="showTab('stats')">📊 Stats</button>
                <button class="stab" data-tab="diff" onclick="showTab('diff')">⚖️ Diff</button>
            </div>
            <div class="sidebar-body" id="sidebar-body">
                <div class="sidebar-placeholder">정책을 선택하거나 업로드하세요.</div>
            </div>
        </aside>

        <!-- Sidebar Resizer -->
        <div class="resizer resizer-sidebar" id="sidebar-resizer"></div>

        <!-- Main Panel -->
        <div class="main-panel" id="main-panel">
            <div class="main-toolbar" id="main-toolbar">
                <div class="breadcrumb-wrap">
                    <div class="breadcrumb" id="breadcrumb">
                        <span class="crumb crumb-root" onclick="loadMainContent('')">Root</span>
                    </div>
                </div>
                <div class="toolbar-right">
                    <div class="search-wrap">
                        <input type="text" id="main-search" placeholder="정책 검색..."
                               oninput="handleSearchInput(event)" onkeydown="handleSearchKeydown(event)">
                        <button class="search-clear hidden" id="search-clear" onclick="clearSearch()">✕</button>
                    </div>
                    <button class="btn sm" id="export-btn" onclick="exportCurrentView()" title="현재 목록 CSV 내보내기" style="display:none;">⬇️ CSV</button>
                </div>
            </div>
            <div class="main-body" id="main-body">
                <div class="empty-state">정책을 선택하거나 업로드하세요.</div>
            </div>
        </div>

        <!-- Detail Resizer -->
        <div class="resizer resizer-detail" id="detail-resizer"></div>

        <!-- Right Detail Panel -->
        <aside class="detail-panel hidden" id="detail-panel">
            <div class="detail-header">
                <span class="detail-title" id="detail-title">상세 정보</span>
                <button class="btn-icon" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-body" id="detail-body">
                <div class="empty-state" style="margin-top:40px;">항목을 선택하세요.</div>
            </div>
        </aside>

    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <span id="status-msg">준비됨</span>
        <span id="policy-stats"></span>
    </footer>

</div>
<!-- Diff Modal -->
<div id="diff-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <span>정책 비교 (Diff)</span>
            <button class="btn-icon" onclick="closeDiffModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="diff-select-row">
                <div class="diff-select-col">
                    <label>파일 A (기준)</label>
                    <select id="diff-select-a"></select>
                </div>
                <div class="diff-arrow">→</div>
                <div class="diff-select-col">
                    <label>파일 B (비교)</label>
                    <select id="diff-select-b"></select>
                </div>
            </div>
            <div id="diff-modal-msg" class="diff-modal-msg hidden"></div>
            <button class="btn primary" id="diff-run-btn" onclick="runDiff()">비교 실행</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
