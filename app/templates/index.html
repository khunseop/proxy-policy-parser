<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyhigh Policy Explorer (Finder Mode)</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="logo">Skyhigh Policy Explorer</div>
            
            <div class="history-container">
                <select id="history-select" onchange="handleSetChange()">
                    <option value="">정책 히스토리 선택...</option>
                </select>
            </div>

            <div class="search-container">
                <input type="text" id="global-search" placeholder="IP, URL, Rule 검색 (Enter)" onkeyup="handleSearch(event)">
            </div>
            <!-- 검색 결과 오버레이 -->
            <div id="search-results" class="search-results-overlay"></div>

            <div class="actions">
                <input type="file" id="xml-upload" accept=".xml" style="display:none;" onchange="handleFileUpload()">
                <button class="btn primary" onclick="document.getElementById('xml-upload').click()">XML 업로드</button>
            </div>
        </header>

        <main class="app-main">
            <!-- 가로로 확장되는 밀러 컬럼 영역 -->
            <div id="tree-container" class="tree-container">
                <div class="loading" style="padding: 20px;">정책을 선택하거나 업로드하세요.</div>
            </div>

            <!-- 우측 상세 정보 패널 (고정) -->
            <section class="detail-panel" id="detail-view">
                <div class="detail-header">상세 정보</div>
                <div id="detail-content" class="detail-container">
                    <div class="empty-state" style="text-align:center; color:#999; margin-top:50px;">
                        항목을 선택하여 상세 내용을 확인하세요.
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <span id="status-msg">준비됨</span>
            <span id="policy-stats">Policies: 0 (Miller Columns Mode)</span>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
